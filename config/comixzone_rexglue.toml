project_name = "comixzone"
file_path = "game_files/default.xex"
out_directory_path = "generated"

# Code generation options (conservative for initial pass)
skip_lr = false
skip_msr = false
ctr_as_local = false
xer_as_local = false
cr_as_local = false
reserved_as_local = false
non_argument_as_local = false
non_volatile_as_local = false
generate_exception_handlers = false

[analysis]
max_jump_extension = 65536

# Manual function overrides for boundary errors
# 33 switch tables in 16 function regions need extended boundaries.
# Most (30/33) are in the Genesis 68K/Z80 emulator instruction dispatchers.

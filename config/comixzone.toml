# Comix Zone XBLA - Static Recompilation Config
# XEX2 → PowerPC → x86-64 via XenonRecomp
#
# Binary: ComixZone-Standard-X360-Final.exe
# Built:  March 27, 2009 15:35:37
# XDK:    2.0.7978.3 (November 2008)
# Dev:    Backbone Entertainment / Sega
# Engine: "SegaVintage" XBLA Classic Framework
#         (Genesis 68K + Z80 + YM2612 + VDP emulator wrapper)

[main]
file_path = "../game_files/default.xex"
out_directory_path = "../ppc"
switch_table_file_path = "switch_tables.toml"

# PE Memory Layout (16 sections):
#   .rdata     0x82000600  - Read-only data (strings, constants)
#   .pdata     0x82089200  - Exception tables
#   .text      0x820A0000  - Main code (1.9MB)
#   .embsec_*  0x82273200  - 9 embedded code sections (68K emu, Z80 emu, etc.)
#   .data      0x822D0000  - Writable data (10.7MB incl. BSS)
#   .XBMOVIE   0x82D03C00  - WMV video support
#   .idata     0x82D10000  - Import tables
#   .XBLD      0x82D20000  - Build metadata
#   .reloc     0x82D20200  - Relocations

# Entry point
# entry_point = 0x8212CD98

# Image layout
# image_base = 0x82000000
# image_size = 0xD40000 (13,893,632 bytes)
# code_base  = 0x820A0000
# code_end   = 0x82311CEC (includes .embsec_ sections)

# === ABI Helper Addresses ===
# Found by find_abi_addrs.py scanning PE image
savegprlr_14_address = 0x82310F00
restgprlr_14_address = 0x82310F50
savefpr_14_address = 0x82311720
restfpr_14_address = 0x8231176C
savevmx_14_address = 0x823117C0
restvmx_14_address = 0x82311A58
savevmx_64_address = 0x82311854
restvmx_64_address = 0x82311AEC
# setjmp: NOT FOUND (game does not use setjmp/longjmp)
# longjmp: NOT FOUND

# === Manual Function Boundaries ===
# 33 functions with switch table label boundary errors, fixed via .pdata
# analysis and PPC code scanning (tools/analyze_pdata.py).
# Each entry extends the auto-detected function to cover all switch labels.
functions = [
    # .text section - individual functions with out-of-range switch labels
    { address = 0x820CCB20, size = 0x0088 },  # switch at 0x820CCB54 (12 labels)
    { address = 0x820D4148, size = 0x0454 },  # switch at 0x820D418C (512 labels)
    { address = 0x820DDD60, size = 0x04F8 },  # switch at 0x820DDE34 (512 labels)
    { address = 0x822543E8, size = 0x0224 },  # switch at 0x82254420 (2 labels)
    { address = 0x82255038, size = 0x0060 },  # switch at 0x82255064 (33 labels)
    { address = 0x82258408, size = 0x01C4 },  # switch at 0x82258448 (12 labels)
    { address = 0x822585D0, size = 0x00D4 },  # switch at 0x822585FC (16 labels)
    { address = 0x8225B7B8, size = 0x05AC },  # switch at 0x8225B85C (512 labels)
    { address = 0x8225CBA0, size = 0x00C0 },  # switch at 0x8225CBD0 (15 labels)
    { address = 0x8225DDE8, size = 0x00C0 },  # switch at 0x8225DE18 (15 labels)

    # Genesis 68K emulator dispatcher region (0x82260xxx-0x82261xxx)
    # 11 switch tables share overlapping label ranges across a ~4KB code block
    { address = 0x82260588, size = 0x0FE4 },  # switches: 0x82260944..0x82261510

    # Genesis emulator continued (0x82262xxx-0x82264xxx)
    # Multiple dispatcher functions with cross-referencing switch labels
    { address = 0x82262098, size = 0x0980 },  # switches: 0x82262634, 0x822627D8, 0x82262960
    { address = 0x82262A18, size = 0x0A5C },  # switches: 0x82262C8C..0x82263274 (6 tables)
    { address = 0x82263474, size = 0x0378 },  # switch at 0x82263784 (10 labels)
    { address = 0x8226393C, size = 0x0408 },  # switch at 0x82263CBC (16 labels)
    { address = 0x822641B8, size = 0x0118 },  # switch at 0x822641E4 (27 labels)
]

[optimizations]
# Start conservative - enable after basic compilation works
skip_lr = false
skip_msr = false
ctr_as_local = false
cr_as_local = false
non_volatile_as_local = false
